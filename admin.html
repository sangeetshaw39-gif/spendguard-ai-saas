<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SpendGuard AI</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366F1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --bg-dark: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --accent-red: #EF4444;
            --accent-green: #10B981;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFF, #94A3B8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: 8px 0;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-red { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); }
        .badge-green { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); }
        .badge-blue { background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        .btn-delete {
            background: transparent;
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: var(--accent-red);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        pre {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            color: #10B981;
            font-size: 0.85rem;
            margin-top: 20px;
            white-space: pre-wrap;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                margin-bottom: 30px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                margin-bottom: 30px;
            }

            .stat-card {
                padding: 20px;
            }

            .stat-value {
                font-size: 2rem;
            }

            .table-container {
                border-radius: 16px;
                overflow-x: auto;
            }

            table {
                min-width: 800px; /* Force scroll for table content */
            }

            .modal-content {
                padding: 24px;
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>Admin Dashboard</h1>
            <div id="admin-info" style="color: var(--text-muted); font-size: 0.9rem;"></div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="total-users">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Analyses</div>
                <div class="stat-value" id="total-analyses">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Spend (Live)</div>
                <div class="stat-value" id="total-spend">--</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>User Email</th>
                        <th>Risk Score</th>
                        <th>Trend</th>
                        <th>Analyses</th>
                        <th>Last Active</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Memory Modal -->
    <div id="memory-modal" class="modal">
        <div class="modal-content">
            <span class="material-symbols-rounded close-modal" onclick="closeModal()">close</span>
            <h3>User Intelligence Profile</h3>
            <pre id="memory-viewer"></pre>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.CONFIG?.API_BASE_URL;
        const supabaseClient = supabase.createClient(window.CONFIG.SUPABASE_URL, window.CONFIG.SUPABASE_ANON_KEY);

        async function initAdmin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session || session.user.email !== "sangeetshaw39@gmail.com") {
                alert("Unauthorized. Redirecting to home.");
                window.location.href = "/";
                return;
            }

            document.getElementById('admin-info').innerText = `Logged in as Master Admin: ${session.user.email}`;
            loadDashboard(session.access_token);
        }

        async function loadDashboard(token) {
            try {
                // Fetch Stats
                const statsResponse = await fetch(`${API_BASE_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!statsResponse.ok) throw new Error(`Backend Error: ${statsResponse.status}`);
                
                const stats = await statsResponse.json();
                
                // Defensive updates
                document.getElementById('total-users').innerText = stats.total_users ?? 0;
                document.getElementById('total-analyses').innerText = stats.total_analyses ?? 0;
                document.getElementById('total-spend').innerText = `₹${(stats.total_spend ?? 0).toLocaleString()}`;

                // Fetch Users
                const usersResponse = await fetch(`${API_BASE_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (usersResponse.ok) {
                    const userData = await usersResponse.json();
                    renderUserTable(userData.users || [], token);
                }

            } catch (err) {
                console.error("Dashboard Sync Failed:", err);
                document.getElementById('admin-info').innerHTML += ` <span style="color:var(--accent-red)">| Sync Error: Backend Offline</span>`;
            }
        }

        function renderUserTable(users, token) {
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = '';

            users.forEach(user => {
                const mem = user.memory || {};
                const tr = document.createElement('tr');
                
                const riskClass = mem.risk_score > 60 ? 'badge-red' : 'badge-green';
                const trendClass = mem.trend === 'increasing' ? 'badge-red' : 'badge-blue';

                tr.innerHTML = `
                    <td>${mem.email || 'Mystery User'} <br><small style="color:var(--text-muted)">${user.user_id.slice(0,8)}...</small></td>
                    <td><span class="badge ${riskClass}">${mem.risk_score || 0}%</span></td>
                    <td><span class="badge ${trendClass}">${mem.trend || 'baseline'}</span></td>
                    <td>${mem.total_analyses_count || 0}</td>
                    <td>${new Date(user.updated_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-delete" style="color:var(--primary); border-color:var(--primary); margin-right:8px;" onclick='viewMemory(${JSON.stringify(mem)})'>View Intelligence</button>
                        <button class="btn-delete" onclick="deleteUser('${user.user_id}', '${token}')">Delete Data</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function viewMemory(memory) {
            document.getElementById('memory-viewer').innerText = JSON.stringify(memory, null, 2);
            document.getElementById('memory-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('memory-modal').style.display = 'none';
        }

        async function deleteUser(userId, token) {
            if (!confirm(`Are you sure you want to delete all data for user ${userId}? This cannot be undone.`)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/admin/user/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                if (result.status === 'success') {
                    alert("User data wiped successfully.");
                    loadDashboard(token);
                }
            } catch (err) {
                alert("Delete failed.");
            }
        }

        initAdmin();
    </script>
</body>
</html>
